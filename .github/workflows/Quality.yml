name: QA

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Aqua & JET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Set up test environment
        run: |
          julia --color=yes --project=test -e '
            using Pkg
            Pkg.develop(path=".")
            Pkg.add(["Aqua", "JET"])
            Pkg.instantiate()
          '

      - name: Run Aqua tests
        run: |
          julia --color=yes --project=test -e '
            using Aqua
            using Ziggurats

            Aqua.test_all(Ziggurats)
          '

      - name: Run JET tests
        run: julia --color=yes --project=test test/quality/JET_tests.jl
